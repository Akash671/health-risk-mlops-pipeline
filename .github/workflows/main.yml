name: Enterprise Health MLOps CI/CD/CT

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 1 * *' # Triggers Automated Continuous Training on the 1st of every month

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Execute Automated Testing
      run: pytest tests/

  continuous-deployment-and-training:
    needs: continuous-integration
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Mirror Repo to Hugging Face (Triggers Cloud Build & CT)
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        git remote add hf https://x-access-token:$HF_TOKEN@huggingface.co/spaces/Akash671/health-risk-mlops-pipeline
        git push --force hf main
